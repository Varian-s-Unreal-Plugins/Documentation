name: Build and Deploy Docs
on:
  push:
    branches: [main]
    paths:
      - "Content/**"
      - "Tools/Quartz/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build
        run: |
          cd Tools/Quartz
          npm install
          npx quartz build -d ../../Content

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Tools/Quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
